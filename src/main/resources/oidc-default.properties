# Default OIDC configuration for Apache Ranger Admin
# These properties should be set in ranger-admin-site.xml

# Enable/disable OIDC authentication
ranger.oidc.enabled=false

# OIDC Provider Issuer URI (e.g., https://keycloak.example.com/realms/myrealm)
ranger.oidc.issuer-uri=

# OIDC Client ID registered with the provider
ranger.oidc.client-id=ranger-admin

# OIDC Client Secret (keep this secure)
ranger.oidc.client-secret=

# JWKS URI for token signature verification
# If not set, derived from issuer-uri + /protocol/openid-connect/certs
ranger.oidc.jwks-uri=

# Redirect URI for the authorization code callback
ranger.oidc.redirect-uri=https://ranger-admin:6182/login/oidc/callback

# OIDC scopes to request
ranger.oidc.scope=openid profile email groups

# JWT claim name for group/role membership
ranger.oidc.groups-claim=groups

# Comma-separated list of OIDC groups that should get ROLE_SYS_ADMIN
ranger.oidc.admin-groups=

# Automatically create Ranger user on first OIDC login
ranger.oidc.auto-create-user=true

# Cookie name for the OIDC session token
ranger.oidc.cookie-name=ranger_oidc_token

# HTTP header for Bearer token (Authorization or custom)
ranger.oidc.token-header=Authorization

# Authorization endpoint (if not discoverable from issuer)
ranger.oidc.auth-endpoint=

# Token endpoint (if not discoverable from issuer)
ranger.oidc.token-endpoint=

# UserInfo endpoint (if not discoverable from issuer)
ranger.oidc.userinfo-endpoint=

# End Session endpoint for RP-Initiated Logout
ranger.oidc.end-session-endpoint=

# JWT claim name for email
ranger.oidc.email-claim=email

# JWT claim name for the username (used as login ID in Ranger)
ranger.oidc.username-claim=preferred_username

# Comma-separated browser user-agent prefixes
ranger.oidc.browser.useragent=Mozilla,Opera,AppleWebKit

# Display name shown on the "Login with ..." button on login.jsp
ranger.oidc.provider-name=OIDC Provider
